<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BankingApp</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  </head>
  <body>
    <app-root>
      <!-- Loading screen shown while Angular boots -->
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #f8fafc;
          font-family: Arial, sans-serif;
          gap: 1.5rem;
        "
      >
        <div style="font-size: 1.5rem; font-weight: 700; color: #1b3a5c">
          Banking<span style="color: #7fb3cc">App</span>
        </div>

        <div
          style="
            width: 2.5rem;
            height: 2.5rem;
            border: 3px solid #e5e7eb;
            border-top-color: #1b3a5c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
          "
        ></div>

        <p style="color: #6b7280; font-size: 0.875rem; text-align: center; max-width: 280px">
          Connecting to the server, please wait a few seconds...
        </p>
      </div>

      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </app-root>
  </body>
</html>
